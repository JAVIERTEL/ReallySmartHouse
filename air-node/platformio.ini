[env:air_node]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    sandeepmistry/LoRa
    adafruit/DHT sensor library
    adafruit/Adafruit Unified Sensor
lib_extra_dirs = ../shared
